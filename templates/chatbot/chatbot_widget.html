{% load static %}

<!-- Chatbot Container -->
<div id="chatbot-container" class="chatbot-container">
    <!-- Header -->
    <div class="chatbot-header">
        <div class="chatbot-header-info">
            <div class="chatbot-avatar">
                <i class="fas fa-robot"></i>
            </div>
            <div>
                <h5 class="chatbot-title">VMS Assistant</h5>
                <div class="chatbot-status">
                    <span class="status-dot"></span>
                    Online
                </div>
            </div>
        </div>
        <div class="chatbot-header-actions">
            <button id="chatbot-clear-btn" title="Clear chat">
                <i class="fas fa-trash-alt"></i>
            </button>
            <button id="chatbot-close-btn" title="Close">
                <i class="fas fa-times"></i>
            </button>
        </div>
    </div>
    
    <!-- Quick Actions -->
    <div class="chatbot-quick-actions">
        <button class="quick-action-btn" data-query="Driver KMs today">📏 Driver KMs</button>
        <button class="quick-action-btn" data-query="Ongoing trips">🚗 Trips</button>
        <button class="quick-action-btn" data-query="Vehicle status">📊 Vehicles</button>
        <button class="quick-action-btn" data-query="Help">❓ Help</button>
    </div>
    
    <!-- Messages Area -->
    <div id="chatbot-messages" class="chatbot-messages">
        <div class="welcome-message">
            <div class="welcome-icon">🤖</div>
            <h4>Hello, {{ request.user.first_name }}!</h4>
            <p>I'm your VMS Assistant. Ask me about drivers, vehicles, trips, fuel consumption, and more!</p>
        </div>
    </div>
    
    <!-- Input Area -->
    <div class="chatbot-input-area">
        <input 
            type="text" 
            id="chatbot-input" 
            class="chatbot-input" 
            placeholder="Type your message..."
            autocomplete="off"
        >
        <button id="chatbot-send-btn" class="chatbot-send-btn" title="Send message">
            <i class="fas fa-paper-plane"></i>
        </button>
    </div>
</div>

<!-- Chatbot Overlay -->
<div id="chatbot-overlay" class="chatbot-overlay"></div>

<!-- Chatbot CSS -->
<link href="{% static 'css/chatbot.css' %}" rel="stylesheet">

<!-- Chatbot JavaScript -->
<script src="{% static 'js/chatbot.js' %}"></script>
