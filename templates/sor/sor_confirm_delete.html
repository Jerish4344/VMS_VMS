{% extends 'base.html' %}
{% block content %}
<div class="container py-4">
  <div class="alert alert-warning">Are you sure you want to delete SOR #{{ sor.id }}?</div>
  <form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Delete</button>
    <a href="{% url 'sor_list' %}" class="btn btn-secondary">Cancel</a>
  </form>
</div>
{% endblock %}
